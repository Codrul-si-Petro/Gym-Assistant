<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set new password</title>
</head>
<body>
  <h1>Set a new password</h1>

  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Change my password</button>
    </form>
  {% else %}
    <p>The password reset link is invalid or has already been used.</p>
    <p><a href="{% url 'password_reset' %}">Request a new password reset</a></p>
  {% endif %}
</body>
</html>
