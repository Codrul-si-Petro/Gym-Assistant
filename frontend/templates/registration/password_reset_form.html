<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Password reset</title>
</head>
<body>
  <h1>Reset your password</h1>

  {% if form.non_field_errors %}
    <div>
      {{ form.non_field_errors }}
    </div>
  {% endif %}

  <form method="post" action="">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send reset email</button>
  </form>

  <p>
    <a href="{% url 'login' %}">Back to login</a>
  </p>
</body>
</html>
