{% comment %}
  Success page shown after password has been successfully reset.
  Used by Django's built-in PasswordResetCompleteView.
  Accessible via /auth/reset/done/ URL.
{% endcomment %}
<!DOCTYPE html>
<html lang="utf-8">
<head>
  <meta charset="utf-8">
  <title>Password reset complete</title>
</head>
<body>
  <h1>Your password has been changed</h1>
  <p>You can now log in with your new password.</p>
  <p><a href="{% url 'login' %}">Go to login</a></p>
</body>
</html>
