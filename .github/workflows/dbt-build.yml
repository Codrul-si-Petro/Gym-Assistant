name: dbt build

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Optional: avoid concurrent runs stacking on the same DB
concurrency:
  group: dbt-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dbt:
    runs-on: ubuntu-latest
    environment: prod

    env:
      DBT_HOST: ${{ secrets.DBT_HOST }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
      DBT_DBNAME: ${{ secrets.DBT_DBNAME }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/db/transformation

    defaults:
      run:
        working-directory: db/transformation

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync
        working-directory: ${{ github.workspace }}

      - name: dbt deps
        run: uv run dbt deps

      - name: dbt build
        run: uv run dbt build
