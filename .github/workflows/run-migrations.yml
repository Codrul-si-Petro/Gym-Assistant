name: Run Database Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Optional: Only trigger when migration files change
    paths:
      - 'backend/**/migrations/**'
      - 'db/alembic/versions/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync
      
      # Run Django migrations
      - name: Run Django migrations
        run: uv run python manage.py migrate --no-input
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "*"
          MAILERSEND_API_TOKEN: ${{ secrets.MAILERSEND_API_TOKEN }}
          MAILERSEND_FROM_EMAIL: ${{ secrets.MAILERSEND_FROM_EMAIL }}
      
      # Run Alembic migrations
      - name: Run Alembic migrations
        run: uv run alembic upgrade head
        working-directory: ./db
        env:
          DATABASE_URL_NO_POOLER: ${{ secrets.DATABASE_URL_NO_POOLER }}