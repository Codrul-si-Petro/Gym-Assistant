name: Wake Server

on:
  workflow_dispatch:
  schedule:
    # Every 13 minutes, between 04:00-23:00 UTC (07:00-02:00 Bucharest)
    - cron: '*/13 4-23 * * *'

jobs:
  wake-server:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync
      
      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps
      
      - name: Wake server
        run: uv run pytest tests/ui/wake.py -v