name: Keep Website Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:        # allows manual run

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping website
        if: env.ping == 'true'
        run: |
          MAX_TRIES=5
          for i in $(seq 1 $MAX_TRIES); do
          if curl -s https://gym-assistant-2smv.onrender.com/; then
          echo "Ping successful"
          break
          else
          echo "Retry in 10s..."
          sleep 10
          fi
          done
