version: 2

seeds:

  - name: seed_exercises
    description: "Existing dimension for exercises"
    columns: 
      - name: exercise_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('seed_exercise_muscle')
                field: exercise_id
      - name: exercise_name
        tests:
          - not_null
          - unique

  - name: seed_muscles 
    description: "Existing dimension for muscles"
    columns: 
    - name: muscle_id
      tests:
        - not_null
        - unique
    - name: muscle_name
      tests:
        - not_null
        - unique

  - name: seed_attachments
    description: "Existing dimension for attachments"
    columns: 
    - name: attachment_id
      tests:
        - not_null
        - unique
    - name: attachment_name
      tests:
        - not_null
        - unique

  - name: seed_equipment
    description: "Existing dimension for equipment"
    columns: 
    - name: equipment_id
      tests:
        - not_null
        - unique
    - name: equipment_name
      tests:
        - not_null
        - unique


  - name: seed_exercise_muscle
    description: "Bridge table to link muscles with exercises"
    columns:
      - name: exercise_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('seed_exercises')
                field: exercise_id

      - name: muscle_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('seed_muscles')
                field: muscle_id

sources:
  - name: core
    schema: core
    tables:
      - name: fact_workouts
        description: "Workout fact table; FKs validated against seeds in seed phase"
        columns:
          - name: exercise_id
            tests:
              - relationships:
                  arguments:
                    to: ref('seed_exercises')
                    field: exercise_id
          - name: equipment_id
            tests:
              - relationships:
                  arguments:
                    to: ref('seed_equipment')
                    field: equipment_id
          - name: attachment_id
            tests:
              - relationships:
                  arguments:
                    to: ref('seed_attachments')
                    field: attachment_id

